<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Carrinho — Emuná</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#6F3CC3" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/styles.css" />
<link rel="stylesheet" href="css/cart.css" />
</head>
<body class="is-loaded">

<div id="header-placeholder"></div>

<main>
  <section class="section section--tight">
    <div class="container">
      <div class="section-heading">
        <p class="eyebrow">Seu carrinho</p>
        <h2>Carrinho de compras</h2>
      </div>

      <div id="cart-empty" class="cart-empty" hidden>
        <p>Seu carrinho está vazio.</p>
        <a class="btn btn--primary" href="loja.html">Ver produtos</a>
      </div>

      <div class="cart-layout" id="cart-layout">
        <div class="cart-items" id="cart-items"></div>

        <aside class="cart-summary">
          <h3>Resumo do pedido</h3>

          <div class="coupon-row">
            <input type="text" id="coupon-input" placeholder="Cupom de desconto" />
            <button class="btn btn--ghost" id="coupon-apply">Aplicar</button>
          </div>
          <p class="coupon-msg" id="coupon-msg"></p>

          <div class="shipping-row">
            <input type="text" id="cep-input" placeholder="Seu CEP" maxlength="9" />
            <button class="btn btn--ghost" id="cep-apply">Calcular frete</button>
          </div>
          <p class="shipping-msg" id="shipping-msg"></p>

          <dl class="summary-lines">
            <div><dt>Subtotal</dt><dd id="summary-subtotal">R$ 0,00</dd></div>
            <div id="summary-discount-row" hidden><dt>Desconto</dt><dd id="summary-discount">− R$ 0,00</dd></div>
            <div><dt>Frete</dt><dd id="summary-shipping">A calcular</dd></div>
          </dl>
          <div class="summary-total">
            <span>Total</span>
            <strong id="summary-total">R$ 0,00</strong>
          </div>

          <a class="btn btn--primary btn--full" id="checkout-btn" href="checkout.html">Finalizar compra</a>
        </aside>
      </div>
    </div>
  </section>
</main>

<div id="footer-placeholder"></div>

<script type="module" src="js/cart-page.js"></script>
</body>
</html>
