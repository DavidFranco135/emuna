<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pedidos — Painel Emuná</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/admin.css" />
</head>
<body>
<div class="admin-shell">
  <div id="sidebar-placeholder"></div>

  <main class="admin-main">
    <div class="panel">
      <div class="panel__header"><h2>Pedidos</h2></div>

      <div class="filter-bar">
        <input type="search" id="order-search" placeholder="Buscar por nº do pedido ou cliente…" />
        <select id="order-status-filter">
          <option value="">Todos os status</option>
          <option value="pendente">Pendente</option>
          <option value="pago">Pago</option>
          <option value="enviado">Enviado</option>
          <option value="cancelado">Cancelado</option>
        </select>
        <select id="order-payment-filter">
          <option value="">Todos os pagamentos</option>
          <option value="pix">Pix</option>
          <option value="cartao">Cartão</option>
          <option value="boleto">Boleto</option>
        </select>
      </div>

      <div class="table-wrap">
        <table>
          <thead><tr><th>Pedido</th><th>Data</th><th>Cliente</th><th>Pagamento</th><th>Total</th><th>Status</th><th></th></tr></thead>
          <tbody id="orders-body"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="admin-modal-backdrop" id="order-backdrop"></div>
<div class="admin-slideover" id="order-slideover" aria-hidden="true">
  <div class="admin-slideover__header">
    <h2 id="order-detail-title">Pedido</h2>
    <button class="admin-slideover__close" id="order-detail-close" aria-label="Fechar">×</button>
  </div>

  <div id="order-detail-body"></div>

  <div class="form-grid" style="margin-top:20px">
    <label class="field">Status
      <select id="order-status-select">
        <option value="pendente">Pendente</option>
        <option value="pago">Pago</option>
        <option value="enviado">Enviado</option>
        <option value="cancelado">Cancelado</option>
      </select>
    </label>
    <label class="field">Código de rastreio
      <input type="text" id="order-tracking-input" placeholder="ex: BR123456789BR" />
    </label>
  </div>

  <div class="admin-slideover__footer">
    <button class="btn btn--primary" id="order-save-btn">Salvar alterações</button>
    <button class="btn btn--ghost" id="order-print-btn">Imprimir</button>
    <button class="btn btn--danger" id="order-cancel-btn">Cancelar pedido</button>
  </div>
</div>

<script type="module" src="js/admin-orders.js"></script>
</body>
</html>
