<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clientes — Painel Emuná</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/admin.css" />
</head>
<body>
<div class="admin-shell">
  <div id="sidebar-placeholder"></div>

  <main class="admin-main">
    <div class="panel">
      <div class="panel__header"><h2>Clientes</h2></div>

      <div class="filter-bar">
        <input type="search" id="customer-search" placeholder="Buscar por nome ou e-mail…" />
        <select id="customer-status-filter">
          <option value="">Todos</option>
          <option value="active">Ativos</option>
          <option value="blocked">Bloqueados</option>
        </select>
      </div>

      <div class="table-wrap">
        <table>
          <thead><tr><th>Cliente</th><th>E-mail</th><th>Pedidos</th><th>Total gasto</th><th>Última compra</th><th>Status</th><th></th></tr></thead>
          <tbody id="customers-body"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="admin-modal-backdrop" id="customer-backdrop"></div>
<div class="admin-slideover" id="customer-slideover" aria-hidden="true" style="width:min(420px,94vw)">
  <div class="admin-slideover__header">
    <h2 id="customer-detail-name">Cliente</h2>
    <button class="admin-slideover__close" id="customer-form-close" aria-label="Fechar">×</button>
  </div>
  <p style="font-size:13px;color:var(--gray-mid);margin-bottom:18px" id="customer-detail-email"></p>

  <label class="field field--wide">Observações
    <textarea id="customer-notes" placeholder="Anotações internas sobre este cliente…"></textarea>
  </label>

  <div class="admin-slideover__footer">
    <button class="btn btn--primary" id="customer-save-btn">Salvar</button>
    <button class="btn btn--danger" id="customer-block-btn">Bloquear cliente</button>
  </div>
</div>

<script type="module" src="js/admin-customers.js"></script>
</body>
</html>
