<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Financeiro — Painel Emuná</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/admin.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
</head>
<body>
<div class="admin-shell">
  <div id="sidebar-placeholder"></div>

  <main class="admin-main">
    <div class="filter-bar">
      <select id="period-select">
        <option value="today">Hoje</option>
        <option value="yesterday">Ontem</option>
        <option value="week">Esta semana</option>
        <option value="month" selected>Este mês</option>
        <option value="year">Este ano</option>
        <option value="custom">Período personalizado</option>
      </select>
      <input type="date" id="period-from" hidden />
      <input type="date" id="period-to" hidden />
      <button class="btn btn--ghost" id="export-csv-btn">Exportar CSV</button>
      <button class="btn btn--ghost" id="export-pdf-btn">Exportar PDF</button>
    </div>

    <div class="stat-grid" id="finance-stats"></div>

    <div class="panel">
      <div class="panel__header"><h2>Entradas × Saídas</h2></div>
      <canvas id="finance-chart" height="100"></canvas>
    </div>

    <div class="panel">
      <div class="panel__header">
        <h2>Lançamentos (saídas)</h2>
        <button class="btn btn--primary btn--sm" id="new-transaction-btn">+ Novo lançamento</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Valor</th><th></th></tr></thead>
          <tbody id="transactions-body"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="admin-modal-backdrop" id="transaction-backdrop"></div>
<div class="admin-slideover" id="transaction-slideover" aria-hidden="true" style="width:min(420px,94vw)">
  <div class="admin-slideover__header">
    <h2>Novo lançamento</h2>
    <button class="admin-slideover__close" id="transaction-form-close" aria-label="Fechar">×</button>
  </div>
  <form id="transaction-form">
    <div class="form-grid">
      <label class="field field--wide">Descrição
        <input type="text" id="tf-description" required />
      </label>
      <label class="field">Categoria
        <input type="text" id="tf-category" placeholder="ex: Insumos, Marketing…" />
      </label>
      <label class="field">Valor (R$)
        <input type="number" id="tf-amount" step="0.01" min="0" required />
      </label>
      <label class="field field--wide">Data
        <input type="date" id="tf-date" required />
      </label>
    </div>
    <div class="admin-slideover__footer">
      <button type="submit" class="btn btn--primary">Salvar lançamento</button>
      <button type="button" class="btn btn--ghost" id="transaction-form-cancel">Cancelar</button>
    </div>
  </form>
</div>

<script type="module" src="js/admin-financeiro.js"></script>
</body>
</html>
